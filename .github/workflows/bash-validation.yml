name: "Enhanced Bash Validation"
on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 
      
      - name: Install validation tools
        run: |
          # ShellCheck is pre-installed on Ubuntu runners
          pip install bashate
          cargo install shellharden || echo "Warning: Shellharden installation may have had issues, continuing anyway"
      
      - name: Run validation tools
        run: |
          # Create results directory
          mkdir -p validation-results
          
          # Check if we have any shell scripts to analyze
          SHELL_SCRIPTS=$(find . -type f -name "*.sh" | wc -l)
          echo "Found $SHELL_SCRIPTS shell scripts to analyze"
          
          if [ "$SHELL_SCRIPTS" -eq 0 ]; then
            echo "No shell scripts found to analyze, creating empty result files"
            echo '{"comments":[]}' > validation-results/shellcheck.json
            touch validation-results/bashate.txt
            touch validation-results/shellharden.txt
          else
            # Run ShellCheck and store raw output (no complex JSON processing)
            echo "Running ShellCheck analysis..."
            
            # Create separate files for direct raw output
            mkdir -p validation-results/raw_output
            
            # Get a basic list of files with issues for the report
            find . -type f -name "*.sh" -exec shellcheck {} \; > validation-results/raw_output/shellcheck_plain.txt 2>&1 || true
            
            # Get JSON output for parsing attempts (but don't rely on it)
            find . -type f -name "*.sh" -exec shellcheck -f json {} \; > validation-results/raw_output/shellcheck_json.txt 2>&1 || true
            
            # Create a simple JSON structure that won't fail parsing
            echo '{"comments":[]}' > validation-results/shellcheck.json
                      
            # Run Bashate with error handling
            echo "Running Bashate on shell scripts"
            find . -type f -name "*.sh" -exec bash -c 'bashate "$1" 2>&1 || true' _ {} \; > validation-results/bashate.txt
            
            # Run Shellharden with error handling
            echo "Running Shellharden on shell scripts"
            find . -type f -name "*.sh" -exec bash -c 'shellharden --check "$1" 2>&1 || true' _ {} \; > validation-results/shellharden.txt
          fi
      
      - name: Generate unified report
        run: |
          # Count issues using grep instead of JSON parsing
          SHELLCHECK_COUNT=$(grep -c "In .* line " validation-results/raw_output/shellcheck_plain.txt 2>/dev/null || echo 0)
          SHELLCHECK_ERROR=$(grep -c "SC[0-9]\+: error:" validation-results/raw_output/shellcheck_plain.txt 2>/dev/null || echo 0)
          SHELLCHECK_WARNING=$(grep -c "SC[0-9]\+: warning:" validation-results/raw_output/shellcheck_plain.txt 2>/dev/null || echo 0)
          SHELLCHECK_INFO=$(grep -c "SC[0-9]\+: note:" validation-results/raw_output/shellcheck_plain.txt 2>/dev/null || echo 0)
          SHELLCHECK_INFO=$((SHELLCHECK_INFO + SHELLCHECK_COUNT - SHELLCHECK_ERROR - SHELLCHECK_WARNING))
          
          # Count Bashate issues
          BASHATE_COUNT=$(grep -c -E "^[^:]+:[0-9]+:[0-9]+: [EW][0-9]+" validation-results/bashate.txt 2>/dev/null || echo 0)
          BASHATE_ERROR=$(grep -c -E "^[^:]+:[0-9]+:[0-9]+: E[0-9]+" validation-results/bashate.txt 2>/dev/null || echo 0)
          BASHATE_WARNING=$(grep -c -E "^[^:]+:[0-9]+:[0-9]+: W[0-9]+" validation-results/bashate.txt 2>/dev/null || echo 0)
          
          # Count Shellharden issues
          SHELLHARDEN_COUNT=$(grep -c "would be rewritten" validation-results/shellharden.txt 2>/dev/null || echo 0)
          
          # Calculate totals
          TOTAL_ISSUES=$((SHELLCHECK_COUNT + BASHATE_COUNT + SHELLHARDEN_COUNT))
          TOTAL_ERRORS=$((SHELLCHECK_ERROR + BASHATE_ERROR))
          TOTAL_WARNINGS=$((SHELLCHECK_WARNING + BASHATE_WARNING + SHELLHARDEN_COUNT))
          TOTAL_INFO=$((SHELLCHECK_INFO))
          
          echo "Issue counts:"
          echo "- ShellCheck: $SHELLCHECK_COUNT ($SHELLCHECK_ERROR errors, $SHELLCHECK_WARNING warnings, $SHELLCHECK_INFO info)"
          echo "- Bashate: $BASHATE_COUNT ($BASHATE_ERROR errors, $BASHATE_WARNING warnings)"
          echo "- Shellharden: $SHELLHARDEN_COUNT issues"
          echo "- Total: $TOTAL_ISSUES ($TOTAL_ERRORS errors, $TOTAL_WARNINGS warnings, $TOTAL_INFO info)"
          
          # Create HTML report - write to file line by line to avoid YAML syntax issues
          echo '<!DOCTYPE html>' > validation-report.html
          echo '<html>' >> validation-report.html
          echo '<head>' >> validation-report.html
          echo '  <title>Bash Validation Report</title>' >> validation-report.html
          echo '  <style>' >> validation-report.html
          echo '    body { font-family: Arial, sans-serif; margin: 20px; }' >> validation-report.html
          echo '    h1, h2, h3 { color: #333; }' >> validation-report.html
          echo '    .error { color: #d73a49; background-color: #fff5f5; }' >> validation-report.html
          echo '    .warning { color: #e36209; background-color: #fff8f0; }' >> validation-report.html
          echo '    .info { color: #0366d6; background-color: #f0f8ff; }' >> validation-report.html
          echo '    .file-section { border: 1px solid #ddd; margin: 10px 0; padding: 10px; border-radius: 5px; }' >> validation-report.html
          echo '    .issue { padding: 8px; margin: 5px 0; border-radius: 3px; }' >> validation-report.html
          echo '    pre { background-color: #f6f8fa; padding: 16px; overflow: auto; }' >> validation-report.html
          echo '  </style>' >> validation-report.html
          echo '</head>' >> validation-report.html
          echo '<body>' >> validation-report.html
          echo '  <h1>Bash Script Validation Report</h1>' >> validation-report.html
          echo "  <p>Generated: $(date)</p>" >> validation-report.html
          echo '  <h2>Summary</h2>' >> validation-report.html
          echo '  <table border="1" cellpadding="5" cellspacing="0">' >> validation-report.html
          echo '    <tr>' >> validation-report.html
          echo '      <th>Tool</th>' >> validation-report.html
          echo '      <th>Errors</th>' >> validation-report.html
          echo '      <th>Warnings</th>' >> validation-report.html
          echo '      <th>Info</th>' >> validation-report.html
          echo '      <th>Total</th>' >> validation-report.html
          echo '    </tr>' >> validation-report.html
          echo "    <tr>" >> validation-report.html
          echo "      <td>ShellCheck</td>" >> validation-report.html
          echo "      <td>$SHELLCHECK_ERROR</td>" >> validation-report.html
          echo "      <td>$SHELLCHECK_WARNING</td>" >> validation-report.html
          echo "      <td>$SHELLCHECK_INFO</td>" >> validation-report.html
          echo "      <td>$SHELLCHECK_COUNT</td>" >> validation-report.html
          echo "    </tr>" >> validation-report.html
          echo "    <tr>" >> validation-report.html
          echo "      <td>Bashate</td>" >> validation-report.html
          echo "      <td>$BASHATE_ERROR</td>" >> validation-report.html
          echo "      <td>$BASHATE_WARNING</td>" >> validation-report.html
          echo "      <td>0</td>" >> validation-report.html
          echo "      <td>$BASHATE_COUNT</td>" >> validation-report.html
          echo "    </tr>" >> validation-report.html
          echo "    <tr>" >> validation-report.html
          echo "      <td>Shellharden</td>" >> validation-report.html
          echo "      <td>0</td>" >> validation-report.html
          echo "      <td>$SHELLHARDEN_COUNT</td>" >> validation-report.html
          echo "      <td>0</td>" >> validation-report.html
          echo "      <td>$SHELLHARDEN_COUNT</td>" >> validation-report.html
          echo "    </tr>" >> validation-report.html
          echo "    <tr>" >> validation-report.html
          echo "      <th>Total</th>" >> validation-report.html
          echo "      <th>$TOTAL_ERRORS</th>" >> validation-report.html
          echo "      <th>$TOTAL_WARNINGS</th>" >> validation-report.html
          echo "      <th>$TOTAL_INFO</th>" >> validation-report.html
          echo "      <th>$TOTAL_ISSUES</th>" >> validation-report.html
          echo "    </tr>" >> validation-report.html
          echo '  </table>' >> validation-report.html
          
          # ShellCheck output section
          echo '  <h2>Raw ShellCheck Output</h2>' >> validation-report.html
          echo '  <pre>' >> validation-report.html
          cat validation-results/raw_output/shellcheck_plain.txt >> validation-report.html 2>/dev/null || echo "No ShellCheck output available" >> validation-report.html
          echo '  </pre>' >> validation-report.html
          
          # Bashate output section
          echo '  <h2>Raw Bashate Output</h2>' >> validation-report.html
          echo '  <pre>' >> validation-report.html
          cat validation-results/bashate.txt >> validation-report.html 2>/dev/null || echo "No Bashate output available" >> validation-report.html
          echo '  </pre>' >> validation-report.html
          
          # Shellharden output section
          echo '  <h2>Raw Shellharden Output</h2>' >> validation-report.html
          echo '  <pre>' >> validation-report.html
          cat validation-results/shellharden.txt >> validation-report.html 2>/dev/null || echo "No Shellharden output available" >> validation-report.html
          echo '  </pre>' >> validation-report.html
          
          # Guidance section
          echo '  <h2>Guidance for Common Issues</h2>' >> validation-report.html
          
          echo '  <h3>ShellCheck</h3>' >> validation-report.html
          echo '  <ul>' >> validation-report.html
          echo '    <li>Visit <a href="https://www.shellcheck.net/">shellcheck.net</a> to learn more about specific error codes</li>' >> validation-report.html
          echo '    <li>Common issues include quoting variables, command substitution, and conditional syntax</li>' >> validation-report.html
          echo '  </ul>' >> validation-report.html
          
          echo '  <h3>Bashate</h3>' >> validation-report.html
          echo '  <ul>' >> validation-report.html
          echo '    <li>E001: Indentation not a multiple of 4</li>' >> validation-report.html
          echo '    <li>E002: Tab indentation</li>' >> validation-report.html
          echo '    <li>E003: Indent not increasing by 4</li>' >> validation-report.html
          echo '    <li>E004: Incorrect continuation line indentation</li>' >> validation-report.html
          echo '    <li>E005: Function declaration not in format "function name {}"</li>' >> validation-report.html
          echo '    <li>E006: Line too long (>79 chars)</li>' >> validation-report.html
          echo '  </ul>' >> validation-report.html
          
          echo '  <h3>Shellharden</h3>' >> validation-report.html
          echo '  <ul>' >> validation-report.html
          echo '    <li>Always quote your variables: use "$var" instead of $var</li>' >> validation-report.html
          echo '    <li>Run shellharden with --transform to automatically fix issues</li>' >> validation-report.html
          echo '  </ul>' >> validation-report.html
          
          echo '</body>' >> validation-report.html
          echo '</html>' >> validation-report.html
          
          # Create a simple text report for console output
          echo "# Bash Script Validation Summary" > validation-report.txt
          echo "Total issues: $TOTAL_ISSUES ($TOTAL_ERRORS errors, $TOTAL_WARNINGS warnings, $TOTAL_INFO info)" >> validation-report.txt
          echo "- ShellCheck: $SHELLCHECK_COUNT ($SHELLCHECK_ERROR errors, $SHELLCHECK_WARNING warnings, $SHELLCHECK_INFO info)" >> validation-report.txt
          echo "- Bashate: $BASHATE_COUNT ($BASHATE_ERROR errors, $BASHATE_WARNING warnings)" >> validation-report.txt
          echo "- Shellharden: $SHELLHARDEN_COUNT quoting issues" >> validation-report.txt
          
          # Create Markdown report for GitHub job summary
          echo "# Bash Script Validation Summary" > validation-report.md
          echo "" >> validation-report.md
          echo "Total issues: **$TOTAL_ISSUES** ($TOTAL_ERRORS errors, $TOTAL_WARNINGS warnings, $TOTAL_INFO info)" >> validation-report.md
          echo "" >> validation-report.md
          echo "| Tool | Errors | Warnings | Info | Total |" >> validation-report.md
          echo "|------|--------|----------|------|-------|" >> validation-report.md
          echo "| ShellCheck | $SHELLCHECK_ERROR | $SHELLCHECK_WARNING | $SHELLCHECK_INFO | $SHELLCHECK_COUNT |" >> validation-report.md
          echo "| Bashate | $BASHATE_ERROR | $BASHATE_WARNING | 0 | $BASHATE_COUNT |" >> validation-report.md
          echo "| Shellharden | 0 | $SHELLHARDEN_COUNT | 0 | $SHELLHARDEN_COUNT |" >> validation-report.md
          echo "| **Total** | **$TOTAL_ERRORS** | **$TOTAL_WARNINGS** | **$TOTAL_INFO** | **$TOTAL_ISSUES** |" >> validation-report.md
          echo "" >> validation-report.md
          
          # ShellCheck details
          echo "## ShellCheck Issues" >> validation-report.md
          echo "" >> validation-report.md
          echo "<details>" >> validation-report.md
          echo "<summary>Click to expand ShellCheck output</summary>" >> validation-report.md
          echo "" >> validation-report.md
          echo '```' >> validation-report.md
          cat validation-results/raw_output/shellcheck_plain.txt >> validation-report.md 2>/dev/null || echo "No ShellCheck output available" >> validation-report.md
          echo '```' >> validation-report.md
          echo "</details>" >> validation-report.md
          echo "" >> validation-report.md
          
          # Bashate details
          echo "## Bashate Issues" >> validation-report.md
          echo "" >> validation-report.md
          echo "<details>" >> validation-report.md
          echo "<summary>Click to expand Bashate output</summary>" >> validation-report.md
          echo "" >> validation-report.md
          echo '```' >> validation-report.md
          cat validation-results/bashate.txt >> validation-report.md 2>/dev/null || echo "No Bashate output available" >> validation-report.md
          echo '```' >> validation-report.md
          echo "</details>" >> validation-report.md
          echo "" >> validation-report.md
          
          # Common issues section
          echo "## How to Fix Common Issues" >> validation-report.md
          echo "" >> validation-report.md
          echo "### ShellCheck" >> validation-report.md
          echo "- Visit [shellcheck.net](https://www.shellcheck.net/) to see explanations for each error code" >> validation-report.md
          echo "- Common issues include unquoted variables, command substitution issues, and conditionals" >> validation-report.md
          echo "" >> validation-report.md
          echo "### Bashate" >> validation-report.md
          echo "- E001: Indentation not a multiple of 4" >> validation-report.md
          echo "- E002: Tab indentation" >> validation-report.md
          echo "- E003: Indent not increasing by 4" >> validation-report.md
          echo "- E004: Incorrect continuation line indentation" >> validation-report.md
          echo "- E005: Function declaration not in format 'function name {}'" >> validation-report.md
          echo "- E006: Line too long (> 79 chars)" >> validation-report.md
          echo "" >> validation-report.md
          echo "### Shellharden" >> validation-report.md
          echo "- Always quote your variables: use \`\"\$var\"\` instead of \`\$var\`" >> validation-report.md
          echo "- Run shellharden with --transform to automatically fix issues" >> validation-report.md
          
          # Output the text report to console
          cat validation-report.txt
          
          # Add to job summary
          cat validation-report.md >> $GITHUB_STEP_SUMMARY
      
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: bash-validation-report
          path: validation-report.html 
      
      - name: Check for critical issues
        if: always()
        run: |
          if [ -f validation-report.txt ]; then
            ERRORS=$(grep -E "Total issues: .* \(([1-9][0-9]*).*errors" validation-report.txt || echo "0")
            if [[ "$ERRORS" != "0" ]]; then
              echo "::error::Found critical issues in bash scripts. See the validation report for details."
              exit 1
            fi
          else
            echo "::warning::Validation report not generated. Check previous steps for errors."
          fi