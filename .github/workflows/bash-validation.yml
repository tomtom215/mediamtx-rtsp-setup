name: Shell Script Validation

# Ensures workflow triggers on any push that includes shell scripts
# or changes to the workflow file itself
on:
  push:
    paths:
      - '**/*.sh'
      - '**/bashrc'
      - '**/profile'
      - '.github/workflows/shell-validate.yml'
    # No branch restrictions to ensure it runs on all branches
  pull_request:
    paths:
      - '**/*.sh'
      - '**/bashrc'
      - '**/profile'
    # No branch restrictions for PRs to ensure broad coverage

# Add debugging capability (uncomment when needed)
# env:
#   ACTIONS_RUNNER_DEBUG: true
#   ACTIONS_STEP_DEBUG: true

jobs:
  # First check if any shell scripts were modified
  # This avoids running the full workflow unnecessarily
  detect-files:
    name: Detect Shell Scripts
    runs-on: ubuntu-latest
    outputs:
      shell_scripts: ${{ steps.filter.outputs.shell_scripts }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper file comparison
      
      - name: Filter relevant files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            shell_scripts:
              - '**/*.sh'
              - '**/bashrc'
              - '**/profile'
              - 'scripts/**'

  # Main validation job only runs if shell scripts were detected
  validate:
    needs: detect-files
    if: ${{ needs.detect-files.outputs.shell_scripts == 'true' }}
    name: Validate Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # Debug step to show environment (uncomment when troubleshooting)
      # - name: Debug environment
      #   run: |
      #     echo "GITHUB_WORKSPACE: $GITHUB_WORKSPACE"
      #     echo "GITHUB_REF: $GITHUB_REF"
      #     find . -type f -name "*.sh" | sort
      
      - name: Install dependencies
        run: |
          # ShellCheck is pre-installed on Ubuntu runners
          # Install Python dependencies
          pip install bashate
          
          # Install Rust and Cargo for Shellharden
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          source "$HOME/.cargo/env"
          
          # Install Shellharden
          cargo install shellharden --version 4.3.0
          
          # Verify installations
          echo "Verifying tool installations:"
          shellcheck --version
          bashate --version
          shellharden --version

      - name: Run ShellCheck
        id: shellcheck
        continue-on-error: true
        run: |
          echo "Running ShellCheck validation..."
          # Using find to locate all shell scripts
          SCRIPTS=$(find . -type f -name "*.sh" -o -name "bashrc" -o -name "profile")
          
          if [ -z "$SCRIPTS" ]; then
            echo "No shell scripts found to validate."
            exit 0
          fi
          
          # Run ShellCheck with detailed output
          echo "$SCRIPTS" | xargs shellcheck -x
      
      - name: Run Shellharden
        id: shellharden
        continue-on-error: true
        run: |
          echo "Running Shellharden validation..."
          # Find all shell scripts
          find . -type f -name "*.sh" -o -name "bashrc" -o -name "profile" | while read -r file; do
            echo "Checking $file"
            shellharden --check "$file" || echo "::warning file=$file::Shellharden found issues"
          done
      
      - name: Run Bashate
        id: bashate
        continue-on-error: true
        run: |
          echo "Running Bashate validation..."
          # Find all shell scripts
          find . -type f -name "*.sh" -o -name "bashrc" -o -name "profile" | while read -r file; do
            echo "Checking $file"
            bashate -i E006 "$file" || echo "::warning file=$file::Bashate found issues"
          done
      
      # Collect all results and fail if any validator failed
      - name: Consolidate validation results
        run: |
          echo "Consolidating validation results..."
          
          # Check if any validator failed
          if [ "${{ steps.shellcheck.outcome }}" == "failure" ]; then
            echo "::error::ShellCheck found issues that need to be fixed"
            FAILED=true
          fi
          
          if [ "${{ steps.shellharden.outcome }}" == "failure" ]; then
            echo "::error::Shellharden found issues that need to be fixed"
            FAILED=true
          fi
          
          if [ "${{ steps.bashate.outcome }}" == "failure" ]; then
            echo "::error::Bashate found issues that need to be fixed"
            FAILED=true
          fi
          
          # Exit with failure if any validator failed
          if [ "${FAILED:-false}" == "true" ]; then
            echo "Shell script validation failed. Please fix the issues above."
            exit 1
          else
            echo "All shell script validations passed!"
          fi
      
      # Optional: Interactive debugging session if needed
      # Uncomment this step when you need to debug workflow issues
      # - name: Setup Debug Session
      #   if: ${{ failure() }}
      #   uses: mxschmitt/action-tmate@v3
      #   with:
      #     limit-access-to-actor: true