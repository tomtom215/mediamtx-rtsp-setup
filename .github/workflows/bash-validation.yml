name: "Enhanced Bash Validation"
on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 
      
      - name: Install validation tools
        run: |
          # ShellCheck is pre-installed on Ubuntu runners
          pip install bashate
          cargo install shellharden || echo "Warning: Shellharden installation may have had issues, continuing anyway"
      
      - name: Run validation tools
        run: |
          # Create results directory
          mkdir -p validation-results
          
          # Check if we have any shell scripts to analyze
          SHELL_SCRIPTS=$(find . -type f -name "*.sh" | wc -l)
          echo "Found $SHELL_SCRIPTS shell scripts to analyze"
          
          if [ "$SHELL_SCRIPTS" -eq 0 ]; then
            echo "No shell scripts found to analyze, creating empty result files"
            echo '{"comments":[]}' > validation-results/shellcheck.json
            touch validation-results/bashate.txt
            touch validation-results/shellharden.txt
          else
            # Run ShellCheck and store raw output (no complex JSON processing)
            echo "Running ShellCheck analysis..."
            
            # Create separate files for direct raw output
            mkdir -p validation-results/raw_output
            
            # Get a basic list of files with issues for the report
            find . -type f -name "*.sh" -exec shellcheck {} \; > validation-results/raw_output/shellcheck_plain.txt 2>&1 || true
            
            # Get JSON output for parsing attempts (but don't rely on it)
            find . -type f -name "*.sh" -exec shellcheck -f json {} \; > validation-results/raw_output/shellcheck_json.txt 2>&1 || true
            
            # Create a simple JSON structure that won't fail parsing
            echo '{"comments":[]}' > validation-results/shellcheck.json
                      
            # Run Bashate with error handling
            echo "Running Bashate on shell scripts"
            find . -type f -name "*.sh" -exec bash -c 'bashate "$1" 2>&1 || true' _ {} \; > validation-results/bashate.txt
            
            # Run Shellharden with error handling
            echo "Running Shellharden on shell scripts"
            find . -type f -name "*.sh" -exec bash -c 'shellharden --check "$1" 2>&1 || true' _ {} \; > validation-results/shellharden.txt
          fi
      
      - name: Generate unified report
        run: |
          # Count issues using grep instead of JSON parsing
          SHELLCHECK_COUNT=$(grep -c "In .* line " validation-results/raw_output/shellcheck_plain.txt 2>/dev/null || echo 0)
          SHELLCHECK_ERROR=$(grep -c "SC[0-9]\+: error:" validation-results/raw_output/shellcheck_plain.txt 2>/dev/null || echo 0)
          SHELLCHECK_WARNING=$(grep -c "SC[0-9]\+: warning:" validation-results/raw_output/shellcheck_plain.txt 2>/dev/null || echo 0)
          SHELLCHECK_INFO=$(grep -c "SC[0-9]\+: note:" validation-results/raw_output/shellcheck_plain.txt 2>/dev/null || echo 0)
          SHELLCHECK_INFO=$((SHELLCHECK_INFO + SHELLCHECK_COUNT - SHELLCHECK_ERROR - SHELLCHECK_WARNING))
          
          # Count Bashate issues
          BASHATE_COUNT=$(grep -c -E "^[^:]+:[0-9]+:[0-9]+: [EW][0-9]+" validation-results/bashate.txt 2>/dev/null || echo 0)
          BASHATE_ERROR=$(grep -c -E "^[^:]+:[0-9]+:[0-9]+: E[0-9]+" validation-results/bashate.txt 2>/dev/null || echo 0)
          BASHATE_WARNING=$(grep -c -E "^[^:]+:[0-9]+:[0-9]+: W[0-9]+" validation-results/bashate.txt 2>/dev/null || echo 0)
          
          # Count Shellharden issues
          SHELLHARDEN_COUNT=$(grep -c "would be rewritten" validation-results/shellharden.txt 2>/dev/null || echo 0)
          
          # Calculate totals
          TOTAL_ISSUES=$((SHELLCHECK_COUNT + BASHATE_COUNT + SHELLHARDEN_COUNT))
          TOTAL_ERRORS=$((SHELLCHECK_ERROR + BASHATE_ERROR))
          TOTAL_WARNINGS=$((SHELLCHECK_WARNING + BASHATE_WARNING + SHELLHARDEN_COUNT))
          TOTAL_INFO=$((SHELLCHECK_INFO))
          
          echo "Issue counts:"
          echo "- ShellCheck: $SHELLCHECK_COUNT ($SHELLCHECK_ERROR errors, $SHELLCHECK_WARNING warnings, $SHELLCHECK_INFO info)"
          echo "- Bashate: $BASHATE_COUNT ($BASHATE_ERROR errors, $BASHATE_WARNING warnings)"
          echo "- Shellharden: $SHELLHARDEN_COUNT issues"
          echo "- Total: $TOTAL_ISSUES ($TOTAL_ERRORS errors, $TOTAL_WARNINGS warnings, $TOTAL_INFO info)"
          
          # Create an HTML report without complex processing
          cat > validation-report.html << EOL
          <!DOCTYPE html>
          <html>
          <head>
            <title>Bash Validation Report</title>
            <style>
              body { font-family: Arial, sans-serif; margin: 20px; }
              h1, h2, h3 { color: #333; }
              .error { color: #d73a49; background-color: #fff5f5; }
              .warning { color: #e36209; background-color: #fff8f0; }
              .info { color: #0366d6; background-color: #f0f8ff; }
              .file-section { border: 1px solid #ddd; margin: 10px 0; padding: 10px; border-radius: 5px; }
              .issue { padding: 8px; margin: 5px 0; border-radius: 3px; }
              pre { background-color: #f6f8fa; padding: 16px; overflow: auto; }
            </style>
          </head>
          <body>
            <h1>Bash Script Validation Report</h1>
            <p>Generated: $(date)</p>
            
            <h2>Summary</h2>
            <table border="1" cellpadding="5" cellspacing="0">
              <tr>
                <th>Tool</th>
                <th>Errors</th>
                <th>Warnings</th>
                <th>Info</th>
                <th>Total</th>
              </tr>
              <tr>
                <td>ShellCheck</td>
                <td>${SHELLCHECK_ERROR}</td>
                <td>${SHELLCHECK_WARNING}</td>
                <td>${SHELLCHECK_INFO}</td>
                <td>${SHELLCHECK_COUNT}</td>
              </tr>
              <tr>
                <td>Bashate</td>
                <td>${BASHATE_ERROR}</td>
                <td>${BASHATE_WARNING}</td>
                <td>0</td>
                <td>${BASHATE_COUNT}</td>
              </tr>
              <tr>
                <td>Shellharden</td>
                <td>0</td>
                <td>${SHELLHARDEN_COUNT}</td>
                <td>0</td>
                <td>${SHELLHARDEN_COUNT}</td>
              </tr>
              <tr>
                <th>Total</th>
                <th>${TOTAL_ERRORS}</th>
                <th>${TOTAL_WARNINGS}</th>
                <th>${TOTAL_INFO}</th>
                <th>${TOTAL_ISSUES}</th>
              </tr>
            </table>
            
            <h2>Raw ShellCheck Output</h2>
            <pre>
EOL
          
          # Add the raw ShellCheck output to the HTML
          cat validation-results/raw_output/shellcheck_plain.txt >> validation-report.html 2>/dev/null || echo "No ShellCheck output available" >> validation-report.html
          
          # Continue HTML report
          cat >> validation-report.html << EOL
            </pre>
            
            <h2>Raw Bashate Output</h2>
            <pre>
EOL
          
          # Add Bashate output to the HTML
          cat validation-results/bashate.txt >> validation-report.html 2>/dev/null || echo "No Bashate output available" >> validation-report.html
          
          # Continue HTML report
          cat >> validation-report.html << EOL
            </pre>
            
            <h2>Raw Shellharden Output</h2>
            <pre>
EOL
          
          # Add Shellharden output to the HTML
          cat validation-results/shellharden.txt >> validation-report.html 2>/dev/null || echo "No Shellharden output available" >> validation-report.html
          
          # Finish HTML report
          cat >> validation-report.html << EOL
            </pre>
            
            <h2>Guidance for Common Issues</h2>
            
            <h3>ShellCheck</h3>
            <ul>
              <li>Visit <a href="https://www.shellcheck.net/">shellcheck.net</a> to learn more about specific error codes</li>
              <li>Common issues include quoting variables, command substitution, and conditional syntax</li>
            </ul>
            
            <h3>Bashate</h3>
            <ul>
              <li>E001: Indentation not a multiple of 4</li>
              <li>E002: Tab indentation</li>
              <li>E003: Indent not increasing by 4</li>
              <li>E004: Incorrect continuation line indentation</li>
              <li>E005: Function declaration not in format 'function name {}'</li>
              <li>E006: Line too long (>79 chars)</li>
            </ul>
            
            <h3>Shellharden</h3>
            <ul>
              <li>Always quote your variables: use \"\$var\" instead of \$var</li>
              <li>Run shellharden with --transform to automatically fix issues</li>
            </ul>
          </body>
          </html>
EOL
          
          # Create a simple text report for console output
          cat > validation-report.txt << EOL
# Bash Script Validation Summary
Total issues: $TOTAL_ISSUES ($TOTAL_ERRORS errors, $TOTAL_WARNINGS warnings, $TOTAL_INFO info)
- ShellCheck: $SHELLCHECK_COUNT ($SHELLCHECK_ERROR errors, $SHELLCHECK_WARNING warnings, $SHELLCHECK_INFO info)
- Bashate: $BASHATE_COUNT ($BASHATE_ERROR errors, $BASHATE_WARNING warnings)
- Shellharden: $SHELLHARDEN_COUNT quoting issues
EOL
          
          # Create Markdown report for GitHub job summary
          cat > validation-report.md << EOL
# Bash Script Validation Summary

Total issues: **$TOTAL_ISSUES** ($TOTAL_ERRORS errors, $TOTAL_WARNINGS warnings, $TOTAL_INFO info)

| Tool | Errors | Warnings | Info | Total |
|------|--------|----------|------|-------|
| ShellCheck | $SHELLCHECK_ERROR | $SHELLCHECK_WARNING | $SHELLCHECK_INFO | $SHELLCHECK_COUNT |
| Bashate | $BASHATE_ERROR | $BASHATE_WARNING | 0 | $BASHATE_COUNT |
| Shellharden | 0 | $SHELLHARDEN_COUNT | 0 | $SHELLHARDEN_COUNT |
| **Total** | **$TOTAL_ERRORS** | **$TOTAL_WARNINGS** | **$TOTAL_INFO** | **$TOTAL_ISSUES** |

## ShellCheck Issues

<details>
<summary>Click to expand raw ShellCheck output</summary>

\`\`\`
$(cat validation-results/raw_output/shellcheck_plain.txt 2>/dev/null || echo "No ShellCheck output available")
\`\`\`
</details>

## Bashate Issues

<details>
<summary>Click to expand raw Bashate output</summary>

\`\`\`
$(cat validation-results/bashate.txt 2>/dev/null || echo "No Bashate output available")
\`\`\`
</details>

## How to Fix Common Issues

### ShellCheck
- Visit [shellcheck.net](https://www.shellcheck.net/) to see explanations for each error code
- Common issues include unquoted variables, command substitution issues, and conditionals

### Bashate
- E001: Indentation not a multiple of 4
- E002: Tab indentation
- E003: Indent not increasing by 4
- E004: Incorrect continuation line indentation
- E005: Function declaration not in format 'function name {}'
- E006: Line too long (> 79 chars)

### Shellharden
- Always quote your variables: use \`"\$var"\` instead of \`\$var\`
- Run shellharden with --transform to automatically fix issues
EOL
          
          # Output the text report to console
          cat validation-report.txt
          
          # Add to job summary
          cat validation-report.md >> $GITHUB_STEP_SUMMARY
      
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: bash-validation-report
          path: validation-report.html 
      
      - name: Check for critical issues
        if: always()
        run: |
          if [ -f validation-report.txt ]; then
            ERRORS=$(grep -E "Total issues: .* \(([1-9][0-9]*).*errors" validation-report.txt || echo "0")
            if [[ "$ERRORS" != "0" ]]; then
              echo "::error::Found critical issues in bash scripts. See the validation report for details."
              exit 1
            fi
          else
            echo "::warning::Validation report not generated. Check previous steps for errors."
          fi