name: "Enhanced Bash Validation"
on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 
      
      - name: Install validation tools
        run: |
          # ShellCheck is pre-installed on Ubuntu runners
          pip install bashate
          cargo install shellharden || echo "Warning: Shellharden installation may have had issues, continuing anyway"
      
      - name: Run validation tools
        run: |
          # Create results directory
          mkdir -p validation-results
          
          # Check if we have any shell scripts to analyze
          SHELL_SCRIPTS=$(find . -type f -name "*.sh" | wc -l)
          echo "Found $SHELL_SCRIPTS shell scripts to analyze"
          
          if [ "$SHELL_SCRIPTS" -eq 0 ]; then
            echo "No shell scripts found to analyze, creating empty result files"
            echo '{"comments":[]}' > validation-results/shellcheck.json
            touch validation-results/bashate.txt
            touch validation-results/shellharden.txt
          else
            # Run ShellCheck individually for each file to handle potential errors
            echo '{"comments":[]}' > validation-results/shellcheck.json
            
            # Create temporary directory for individual results
            mkdir -p temp_shellcheck
            
            for script in $(find . -type f -name "*.sh"); do
              echo "Running ShellCheck on $script"
              # Run ShellCheck and capture exit code
              if shellcheck -f json "$script" > "temp_shellcheck/$(basename "$script").json" 2>/dev/null; then
                echo "ShellCheck completed successfully for $script"
              else
                echo "ShellCheck had warnings/errors for $script (normal behavior)"
              fi
            done
            
            # Combine results properly using jq if there are any results
            RESULT_COUNT=$(find temp_shellcheck -type f -name "*.json" | wc -l)
            if [ "$RESULT_COUNT" -gt 0 ]; then
              echo "Combining $RESULT_COUNT ShellCheck results"
              # Use jq to combine the results safely
              jq -s '[.[] | .[] | {file: .file, line: .line, column: .column, level: .level, code: .code, message: .message, fix: .fix?}]' temp_shellcheck/*.json > temp_combined.json
              # Create final well-formed JSON
              jq '{"comments": .}' temp_combined.json > validation-results/shellcheck.json || echo '{"comments":[]}' > validation-results/shellcheck.json
            fi
            
            # Verify the JSON is valid
            if ! jq empty validation-results/shellcheck.json 2>/dev/null; then
              echo "Warning: Generated ShellCheck JSON is not valid, creating empty structure"
              echo '{"comments":[]}' > validation-results/shellcheck.json
            fi
            
            # Run Bashate with error handling
            echo "Running Bashate on shell scripts"
            find . -type f -name "*.sh" -exec bash -c 'bashate "$1" 2>&1 || true' _ {} \; > validation-results/bashate.txt
            
            # Run Shellharden with error handling
            echo "Running Shellharden on shell scripts"
            find . -type f -name "*.sh" -exec bash -c 'shellharden --check "$1" 2>&1 || true' _ {} \; > validation-results/shellharden.txt
          fi
      
      - name: Generate unified report
        run: |
          # Create simple report parser script
          cat > parse-reports.sh << 'EOF'
          #!/bin/bash
          
          echo "Starting validation report generation..."
          
          # Create HTML report header
          cat > validation-report.html << 'HTML'
          <!DOCTYPE html>
          <html>
          <head>
            <title>Bash Validation Report</title>
            <style>
              body { font-family: Arial, sans-serif; margin: 20px; }
              h1, h2, h3 { color: #333; }
              .error { color: #d73a49; background-color: #fff5f5; }
              .warning { color: #e36209; background-color: #fff8f0; }
              .info { color: #0366d6; background-color: #f0f8ff; }
              .file-section { border: 1px solid #ddd; margin: 10px 0; padding: 10px; border-radius: 5px; }
              .issue { padding: 8px; margin: 5px 0; border-radius: 3px; }
              .fix-suggestion { background-color: #f0fff0; border-left: 4px solid #2cbe4e; padding: 10px; margin: 5px 0; }
              code { font-family: monospace; background-color: #f6f8fa; padding: 2px 4px; }
              .issue-location { font-weight: bold; }
              .collapsible { cursor: pointer; }
              .content { display: none; overflow: hidden; }
            </style>
            <script>
              function toggleContent(id) {
                var content = document.getElementById(id);
                if (content.style.display === "block") {
                  content.style.display = "none";
                } else {
                  content.style.display = "block";
                }
              }
            </script>
          </head>
          <body>
            <h1>Bash Script Validation Report</h1>
            <p>Generated: $(date)</p>
            <div id="summary">
              <h2>Summary</h2>
              <p>This report combines outputs from ShellCheck, Bashate, and Shellharden.</p>
              <div id="stats"></div>
            </div>
            <div id="issues">
          HTML
          
          # Initialize counters
          SHELLCHECK_COUNT=0
          SHELLCHECK_ERROR=0
          SHELLCHECK_WARNING=0
          SHELLCHECK_INFO=0
          BASHATE_COUNT=0
          BASHATE_ERROR=0
          BASHATE_WARNING=0
          SHELLHARDEN_COUNT=0
          
          # Process ShellCheck results if file exists and is valid JSON
          if [ -s validation-results/shellcheck.json ] && jq empty validation-results/shellcheck.json 2>/dev/null; then
            echo "Processing ShellCheck results..."
            
            # Count issues by severity
            SHELLCHECK_ERROR=$(jq '.comments | map(select(.level == "error")) | length' validation-results/shellcheck.json 2>/dev/null || echo 0)
            SHELLCHECK_WARNING=$(jq '.comments | map(select(.level == "warning")) | length' validation-results/shellcheck.json 2>/dev/null || echo 0)
            SHELLCHECK_INFO=$(jq '.comments | map(select(.level == "info" or .level == "style")) | length' validation-results/shellcheck.json 2>/dev/null || echo 0)
            SHELLCHECK_COUNT=$(jq '.comments | length' validation-results/shellcheck.json 2>/dev/null || echo 0)
            
            echo "Found $SHELLCHECK_COUNT ShellCheck issues ($SHELLCHECK_ERROR errors, $SHELLCHECK_WARNING warnings, $SHELLCHECK_INFO info)"
            
            # Process issues if we have any
            if [ "$SHELLCHECK_COUNT" -gt 0 ]; then
              # Create a temporary file for each file+severity combination
              ISSUES_BY_FILE=$(jq -r '.comments | group_by(.file) | map({filename: .[0].file, issues: .}) | .[]' validation-results/shellcheck.json 2>/dev/null)
              
              if [ -n "$ISSUES_BY_FILE" ]; then
                echo "$ISSUES_BY_FILE" | while read -r file_block; do
                  FILENAME=$(echo "$file_block" | jq -r '.filename')
                  ISSUES=$(echo "$file_block" | jq -r '.issues')
                  
                  echo "Processing $FILENAME with $(echo "$ISSUES" | jq 'length') issues"
                  
                  # Create file section in HTML
                  echo "<div class='file-section'>" >> validation-report.html
                  echo "<h2>$FILENAME</h2>" >> validation-report.html
                  
                  # Group by severity
                  LEVELS=$(echo "$ISSUES" | jq -r 'group_by(.level) | map({level: .[0].level, issues: .}) | .[]')
                  
                  echo "$LEVELS" | while read -r level_block; do
                    LEVEL=$(echo "$level_block" | jq -r '.level')
                    LEVEL_ISSUES=$(echo "$level_block" | jq -r '.issues')
                    
                    echo "<h3 class='$LEVEL'>${LEVEL^} issues</h3>" >> validation-report.html
                    
                    echo "$LEVEL_ISSUES" | jq -c '.[]' | while read -r issue; do
                      LINE=$(echo "$issue" | jq -r '.line')
                      COL=$(echo "$issue" | jq -r '.column')
                      MSG=$(echo "$issue" | jq -r '.message')
                      CODE=$(echo "$issue" | jq -r '.code')
                      
                      # Create unique ID for collapsible section
                      ISSUE_ID="issue-$(echo "$FILENAME-$LINE-$COL-$CODE" | md5sum | cut -d' ' -f1)"
                      
                      echo "<div class='issue $LEVEL'>" >> validation-report.html
                      echo "<div class='issue-location'>Line $LINE, Column $COL: $MSG</div>" >> validation-report.html
                      echo "<div>Code: SC$CODE</div>" >> validation-report.html
                      
                      # Add fix suggestion if available
                      HAS_FIX=$(echo "$issue" | jq 'has("fix")')
                      if [ "$HAS_FIX" = "true" ]; then
                        echo "<div class='collapsible' onclick='toggleContent(\"$ISSUE_ID\")'>View suggested fix</div>" >> validation-report.html
                        echo "<div id='$ISSUE_ID' class='content fix-suggestion'>" >> validation-report.html
                        echo "<code>$(echo "$issue" | jq -r '.fix // "No fix available"')</code>" >> validation-report.html
                        echo "</div>" >> validation-report.html
                      fi
                      
                      echo "</div>" >> validation-report.html
                    done
                  done
                  
                  echo "</div>" >> validation-report.html
                done
              else
                echo "No file-grouped issues found in ShellCheck results"
              fi
            else
              echo "No ShellCheck issues found"
            fi
          else
            echo "ShellCheck results file is empty or invalid"
          fi
          
          # Process Bashate results
          if [ -s validation-results/bashate.txt ]; then
            echo "Processing Bashate results..."
            
            # Parse Bashate output
            declare -A FILE_ISSUES
            
            while IFS= read -r line; do
              if [[ $line =~ ^([^:]+):([0-9]+):([0-9]+):\ ([EW][0-9]+):\ (.*)$ ]]; then
                FILE="${BASH_REMATCH[1]}"
                LINE="${BASH_REMATCH[2]}"
                COL="${BASH_REMATCH[3]}"
                CODE="${BASH_REMATCH[4]}"
                MSG="${BASH_REMATCH[5]}"
                
                # Determine severity
                if [[ "$CODE" =~ ^E ]]; then
                  SEVERITY="error"
                  ((BASHATE_ERROR++))
                else
                  SEVERITY="warning"
                  ((BASHATE_WARNING++))
                fi
                
                ((BASHATE_COUNT++))
                
                # Add to file issues
                if [ -z "${FILE_ISSUES[$FILE]}" ]; then
                  FILE_ISSUES[$FILE]=""
                fi
                
                ISSUE="<div class='issue $SEVERITY'><div class='issue-location'>Line $LINE, Column $COL: $MSG</div><div>Code: $CODE</div></div>"
                FILE_ISSUES[$FILE]+="$ISSUE"
              fi
            done < validation-results/bashate.txt
            
            echo "Found $BASHATE_COUNT Bashate issues ($BASHATE_ERROR errors, $BASHATE_WARNING warnings)"
            
            # Add Bashate results to report
            for FILE in "${!FILE_ISSUES[@]}"; do
              echo "<div class='file-section'>" >> validation-report.html
              echo "<h2>$FILE (Bashate)</h2>" >> validation-report.html
              echo "${FILE_ISSUES[$FILE]}" >> validation-report.html
              echo "</div>" >> validation-report.html
            done
          else
            echo "Bashate results file is empty"
          fi
          
          # Process Shellharden results
          if [ -s validation-results/shellharden.txt ]; then
            echo "Processing Shellharden results..."
            
            # Parse Shellharden output
            declare -A SHELLHARDEN_FILES
            
            while IFS= read -r line; do
              # Simple string check for Shellharden issues
              if [[ $line == *"would be rewritten"* ]]; then
                # Extract the file path using sed
                FILE=$(echo "$line" | sed -E 's/ would be rewritten.*//')
                
                if [ -z "${SHELLHARDEN_FILES[$FILE]}" ]; then
                  SHELLHARDEN_FILES[$FILE]=1
                else
                  ((SHELLHARDEN_FILES[$FILE]++))
                fi
                
                ((SHELLHARDEN_COUNT++))
              fi
            done < validation-results/shellharden.txt
            
            echo "Found $SHELLHARDEN_COUNT Shellharden issues"
            
            # Add Shellharden results to report
            for FILE in "${!SHELLHARDEN_FILES[@]}"; do
              echo "<div class='file-section'>" >> validation-report.html
              echo "<h2>$FILE (Shellharden)</h2>" >> validation-report.html
              echo "<div class='issue warning'>" >> validation-report.html
              echo "<div class='issue-location'>Found ${SHELLHARDEN_FILES[$FILE]} quoting issues</div>" >> validation-report.html
              echo "<p>Shellharden detected improper variable quoting. Run with <code>shellharden --transform \"$FILE\"</code> to see suggested fixes.</p>" >> validation-report.html
              echo "</div>" >> validation-report.html
              echo "</div>" >> validation-report.html
            done
          else
            echo "Shellharden results file is empty"
          fi
          
          # Add stats to summary
          TOTAL_ISSUES=$((SHELLCHECK_COUNT + BASHATE_COUNT + SHELLHARDEN_COUNT))
          TOTAL_ERRORS=$((SHELLCHECK_ERROR + BASHATE_ERROR))
          TOTAL_WARNINGS=$((SHELLCHECK_WARNING + BASHATE_WARNING + SHELLHARDEN_COUNT))
          TOTAL_INFO=$((SHELLCHECK_INFO))
          
          echo "Total: $TOTAL_ISSUES issues ($TOTAL_ERRORS errors, $TOTAL_WARNINGS warnings, $TOTAL_INFO info)"
          
          # Insert stats into the HTML
          STATS="<table>
            <tr><th>Tool</th><th>Errors</th><th>Warnings</th><th>Info</th><th>Total</th></tr>
            <tr><td>ShellCheck</td><td>$SHELLCHECK_ERROR</td><td>$SHELLCHECK_WARNING</td><td>$SHELLCHECK_INFO</td><td>$SHELLCHECK_COUNT</td></tr>
            <tr><td>Bashate</td><td>$BASHATE_ERROR</td><td>$BASHATE_WARNING</td><td>0</td><td>$BASHATE_COUNT</td></tr>
            <tr><td>Shellharden</td><td>0</td><td>$SHELLHARDEN_COUNT</td><td>0</td><td>$SHELLHARDEN_COUNT</td></tr>
            <tr><th>Total</th><th>$TOTAL_ERRORS</th><th>$TOTAL_WARNINGS</th><th>$TOTAL_INFO</th><th>$TOTAL_ISSUES</th></tr>
          </table>"
          
          # Add closing tags to HTML
          echo "</div></body></html>" >> validation-report.html
          
          # Insert stats into the HTML
          sed -i "s|<div id=\"stats\"></div>|<div id=\"stats\">$STATS</div>|" validation-report.html
          
          # Create a simple text report for console output
          echo "# Bash Script Validation Summary" > validation-report.txt
          echo "Total issues: $TOTAL_ISSUES ($TOTAL_ERRORS errors, $TOTAL_WARNINGS warnings, $TOTAL_INFO info)" >> validation-report.txt
          echo "- ShellCheck: $SHELLCHECK_COUNT ($SHELLCHECK_ERROR errors, $SHELLCHECK_WARNING warnings, $SHELLCHECK_INFO info)" >> validation-report.txt
          echo "- Bashate: $BASHATE_COUNT ($BASHATE_ERROR errors, $BASHATE_WARNING warnings)" >> validation-report.txt
          echo "- Shellharden: $SHELLHARDEN_COUNT quoting issues" >> validation-report.txt
          
          # Create Markdown report for GitHub job summary
          echo "# Bash Script Validation Summary" > validation-report.md
          echo "Total issues: **$TOTAL_ISSUES** ($TOTAL_ERRORS errors, $TOTAL_WARNINGS warnings, $TOTAL_INFO info)" >> validation-report.md
          echo "" >> validation-report.md
          echo "| Tool | Errors | Warnings | Info | Total |" >> validation-report.md
          echo "|------|--------|----------|------|-------|" >> validation-report.md
          echo "| ShellCheck | $SHELLCHECK_ERROR | $SHELLCHECK_WARNING | $SHELLCHECK_INFO | $SHELLCHECK_COUNT |" >> validation-report.md
          echo "| Bashate | $BASHATE_ERROR | $BASHATE_WARNING | 0 | $BASHATE_COUNT |" >> validation-report.md
          echo "| Shellharden | 0 | $SHELLHARDEN_COUNT | 0 | $SHELLHARDEN_COUNT |" >> validation-report.md
          echo "| **Total** | **$TOTAL_ERRORS** | **$TOTAL_WARNINGS** | **$TOTAL_INFO** | **$TOTAL_ISSUES** |" >> validation-report.md
          
          if [ $TOTAL_ISSUES -gt 0 ]; then
            echo "" >> validation-report.md
            echo "## Issues by File" >> validation-report.md
            
            # Add issues by file for better backlog creation
            if [ $SHELLCHECK_COUNT -gt 0 ]; then
              echo "" >> validation-report.md
              echo "### ShellCheck Issues" >> validation-report.md
              
              jq -r '.comments | group_by(.file) | .[] | "#### " + .[0].file + "\n\n" + 
                 (. | sort_by(.level == "error" | not, .level == "warning" | not, .line) | 
                 map("- **" + .level + "** (Line " + (.line|tostring) + ", Col " + (.column|tostring) + 
                 "): " + .message + " (SC" + (.code|tostring) + ")") | join("\n"))' \
                 validation-results/shellcheck.json >> validation-report.md || 
                 echo "Error generating ShellCheck report details" >> validation-report.md
            fi
            
            if [ $BASHATE_COUNT -gt 0 ]; then
              echo "" >> validation-report.md
              echo "### Bashate Issues" >> validation-report.md
              
              # Group Bashate issues by file
              for FILE in "${!FILE_ISSUES[@]}"; do
                echo "#### $FILE" >> validation-report.md
                echo "" >> validation-report.md
                grep -E "^$FILE:[0-9]+:[0-9]+: [EW][0-9]+: " validation-results/bashate.txt | 
                  sort | 
                  sed -E 's/^[^:]+:([0-9]+):([0-9]+): (E[0-9]+): (.*)/- **error** (Line \1, Col \2): \4 (\3)/' | 
                  sed -E 's/^[^:]+:([0-9]+):([0-9]+): (W[0-9]+): (.*)/- **warning** (Line \1, Col \2): \4 (\3)/' >> validation-report.md
                echo "" >> validation-report.md
              done
            fi
            
            if [ $SHELLHARDEN_COUNT -gt 0 ]; then
              echo "" >> validation-report.md
              echo "### Shellharden Issues" >> validation-report.md
              
              # Group Shellharden issues by file
              for FILE in "${!SHELLHARDEN_FILES[@]}"; do
                echo "#### $FILE" >> validation-report.md
                echo "" >> validation-report.md
                echo "- **warning**: ${SHELLHARDEN_FILES[$FILE]} variable quoting issues detected. Run \`shellharden --transform \"$FILE\"\` to see suggested fixes." >> validation-report.md
                echo "" >> validation-report.md
              done
            fi
            
            echo "" >> validation-report.md
            echo "## How to Fix Common Issues" >> validation-report.md
            echo "" >> validation-report.md
            echo "### ShellCheck" >> validation-report.md
            echo "- Visit [shellcheck.net](https://www.shellcheck.net/) to see explanations for each error code" >> validation-report.md
            echo "- Or run \`shellcheck -f json <script> | jq '.comments[] | {code, message, fix}'\` locally to see fixes" >> validation-report.md
            echo "" >> validation-report.md
            echo "### Bashate" >> validation-report.md
            echo "- E001: Indentation not a multiple of 4" >> validation-report.md
            echo "- E002: Tab indentation" >> validation-report.md
            echo "- E003: Indent not increasing by 4" >> validation-report.md
            echo "- E004: Incorrect continuation line indentation" >> validation-report.md
            echo "- E005: Function declaration not in format 'function name {'" >> validation-report.md
            echo "- E006: Line too long (> 79 chars)" >> validation-report.md
            echo "- E010: Do not on same line as [" >> validation-report.md
            echo "" >> validation-report.md
            echo "### Shellharden" >> validation-report.md
            echo "- Properly quote your variables: use \`\"\$var\"\` instead of \`\$var\` to avoid word splitting" >> validation-report.md
          fi
          
          echo "Report generation completed"
          EOF
          
          # Make the script executable and run it
          chmod +x parse-reports.sh
          ./parse-reports.sh
          
          # Output the text report to console
          cat validation-report.txt
          
          # Add to job summary
          cat validation-report.md >> $GITHUB_STEP_SUMMARY
      
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: bash-validation-report
          path: validation-report.html 
      
      - name: Check for critical issues
        if: always()
        run: |
          if [ -f validation-report.txt ]; then
            ERRORS=$(grep -E "Total issues: .* \(([1-9][0-9]*).*errors" validation-report.txt || echo "0")
            if [[ "$ERRORS" != "0" ]]; then
              echo "::error::Found critical issues in bash scripts. See the validation report for details."
              exit 1
            fi
          else
            echo "::warning::Validation report not generated. Check previous steps for errors."
          fi